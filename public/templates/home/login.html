<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LibDB</title>
</head>
<body>
    <section id="login">
        <div id="login-container">
            <h1 id="login-title"> Bem vindo!</h1>
            <form id="login-form" action="">
                <div></div>
                <label for="email-input">Email: </label>
                <input type="email" id="email-input" class="text-input" placeholder="user123@gmail.com">
                <label for="passowrd-input">Senha: </label>
                <input type="password" id="password-input" class="text-input" placeholder="*******">
                <p>Esqueceu a senha?</p>
                <div id="login-checkboxes">
                    <div>
                        <input type="checkbox" name="ver-senha"  id="show-password-checkbox">
                        <label for="ver-senha">Mostrar senha</label>
                    </div>
                    <div>
                        <input type="checkbox" name="lembre-se"  id="remember-me-checkbox">
                        <label for="">Lembre-se</label>
                    </div>
                    
                    
                </div>
                <div id="login-buttons">
                    <button id="login-button">Logar</button>
                    <button id="register-button">Criar nova conta!</button>
                </div>
            </form>
        </div>
    </section>
</body>
</html>
